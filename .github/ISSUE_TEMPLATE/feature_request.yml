name: Feature Request
description: Suggest an improvement or a new feature for the stack
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please check [existing issues](../../issues) first to avoid duplicates.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Redis configuration
        - RabbitMQ configuration
        - Monitoring (Prometheus / Grafana)
        - Web interfaces (RedisInsight / RabbitScout)
        - Docker Compose setup
        - Documentation
        - Security
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation you're running into
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
