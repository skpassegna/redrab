# ============================================================
#  docker-compose.monitoring.yml
#  Stack de monitoring PRODUCTION — GRATUIT & OPEN SOURCE
#  Session Date : 2026-03-10 | Sources vérifiées ≥ 2025-04-02
# ============================================================
#
#  Outils inclus :
#  ┌─────────────────────────────────────────────────────┐
#  │  Redis     → RedisInsight (GUI officiel)   :5540   │
#  │  Redis     → redis_exporter → Prometheus   :9121   │
#  │  RabbitMQ  → Management UI (natif)         :15672  │
#  │  RabbitMQ  → rabbitmq_prometheus plugin    :15692  │
#  │  RabbitMQ  → RabbitScout (GUI moderne)     :3001   │
#  │  Prometheus (métriques)                    :9090   │
#  │  Grafana   (dashboards auto-provisionnés)  :3002   │
#  └─────────────────────────────────────────────────────┘
#
#  Usage :
#    docker compose -f docker-compose.yml \
#                   -f docker-compose.monitoring.yml up -d
#
#  URL à ouvrir après démarrage :
#    Grafana        → http://localhost:3002   (admin / $GF_ADMIN_PASSWORD)
#    Prometheus     → http://localhost:9090
#    RedisInsight   → http://localhost:5540
#    RabbitMQ UI    → http://localhost:15672  ($RABBITMQ_USER / $RABBITMQ_PASSWORD)
#    RabbitScout    → http://localhost:3001   (mêmes creds RabbitMQ)
# ============================================================

services:

  # ════════════════════════════════════════════════
  #  REDIS EXPORTER — expose métriques Redis → Prometheus
  #  Source : oliver006/redis_exporter (MIT, 3.5k★)
  #  Port   : 9121 (/metrics)
  # ════════════════════════════════════════════════
  redis-exporter:
    image: oliver006/redis_exporter:alpine
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_USER: ${REDIS_EXPORTER_USER:-appuser}
      REDIS_PASSWORD: ${REDIS_EXPORTER_PASSWORD:-CHANGE_ME_APP_PASSWORD}
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - infra-backend
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════
  #  PROMETHEUS — collecte & stockage des métriques
  #  Port : 9090
  # ════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - redis-exporter
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════
  #  GRAFANA — dashboards Redis + RabbitMQ (auto-provisionnés)
  #  Dashboard Redis    : https://grafana.com/grafana/dashboards/763
  #  Dashboard RabbitMQ : https://grafana.com/grafana/dashboards/10991
  #  Port host : 3002 (évite conflit NestJS :3000)
  # ════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: warn
      GF_FEATURE_TOGGLES_ENABLE: ""
    ports:
      - "127.0.0.1:3002:3000" 
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ════════════════════════════════════════════════
  #  REDISINSIGHT — GUI officiel Redis (gratuit, web)
  #  Source : redis.io/insight — port 5540
  # ════════════════════════════════════════════════
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    environment:
      REDISINSIGHT_ACCEPT_LICENSE: "true"
    ports:
      - "127.0.0.1:5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - infra-backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ════════════════════════════════════════════════
  #  RABBITSCOUT — GUI moderne RabbitMQ (open source, Next.js)
  #  Source : github.com/Ralve-org/RabbitScout
  #  Port   : 3001
  # ════════════════════════════════════════════════
  rabbitscout:
    image: ghcr.io/ralve-org/rabbitscout:latest
    container_name: rabbitscout
    restart: unless-stopped
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "15672"
      RABBITMQ_PROTOCOL: http
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - infra-backend
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"


# ════════════════════════════════════════
#  VOLUMES monitoring
# ════════════════════════════════════════
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  redisinsight_data:
    driver: local


# ════════════════════════════════════════
#  NETWORKS
# ════════════════════════════════════════
networks:
  infra-backend:
    name: infra-backend
  monitoring:
    driver: bridge
    name: monitoring-net
