# ============================================================
#  prometheus.yml — Configuration Prometheus PRODUCTION
#  Sources : grafana.com/oss/prometheus, rabbitmq.com/docs/prometheus
#            deepwiki.com/oliver006/redis_exporter (2025-04)
# ============================================================

global:
  # Intervalle de scrape global
  # RabbitMQ docs recommandent 15-30s pour prod
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    environment: "production"
    stack: "redis-rabbitmq"


# ────────────────────────────────────────────
#  RÈGLES D'ALERTES (fichiers externes)
# ────────────────────────────────────────────
# rule_files:
#   - "/etc/prometheus/rules/*.yml"


# ────────────────────────────────────────────
#  SCRAPE CONFIGS
# ────────────────────────────────────────────
scrape_configs:

  # ── Prometheus lui-même ───────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Redis — via redis_exporter ────────────
  # Source : oliver006/redis_exporter (MIT)
  # Métriques : ~190 séries par défaut
  # Port exporter : 9121
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          instance: "redis-prod"
    scrape_interval: 15s

  # ── RabbitMQ — plugin rabbitmq_prometheus ─
  # Source : rabbitmq.com/docs/prometheus
  # Port natif : 15692 (pas d'exporter externe nécessaire)
  # Intervalle recommandé en prod : 15-30s
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          instance: "rabbitmq-prod"
    scrape_interval: 15s
    metrics_path: /metrics
