# ============================================================
#  datasources.yml — Grafana provisioning datasource
#  Source : grafana.com/docs/grafana/latest/administration/provisioning
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-ds
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
